<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Домашнее задание - Bootstrap</title>
    <link href="css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<h3 class="text-center mt-5">Контакты</h3>
<div class="row">
    <div class="col-2"></div>
    <div class="col-8">
        <div class="row mt-5">
            <div class="col-5">
                <div class="card bg-body text-body p-3">
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" id="name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Почта</label>
                            <div class="input-group">
                                <span class="input-group-text">@</span>
                                <input type="text" class="form-control" >
                            </div>
                            <div class="mb-3 mt-3">
                                <label class="form-label">Сообщение</label>
                                <textarea class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Отправить</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-1"></div>
            <div class="col-6 mt-3">
                    <div class="card-body">
                        <h5>Наши контакты</h5>
                        <div class="row mt-3">
                            <p class="lh-1">Loren ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod
                                tempor incididunt ut labore et dolote magna aliqua.
                            <p class="lh-sm">While these feedback styles cannot be styled with CSS, you can still
                                customize the feedback text, through JavaScript.
                        </div>
                    </div>
            </div>
        </div>
    </div>
    <div class="col-2"></div>
</div>
</body>
</html>
